<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer fortress ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#c4956a" stroke-width="16"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c4956a" stroke-width="3"/>
  
  <!-- Three sector dividers (120deg apart) -->
  <line x1="256" y1="256" x2="256" y2="36" stroke="#c4956a" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="446.5" y2="366" stroke="#c4956a" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="65.5" y2="366" stroke="#c4956a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Inner circle (Sector Zero) -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#c4956a" stroke-width="10"/>
  
  <!-- Central diamond (Kage's authority) -->
  <polygon points="256,220 282,256 256,292 230,256" fill="#c4956a"/>
  
  <!-- Three gate notches on outer ring -->
  <rect x="248" y="20" width="16" height="28" rx="2" fill="#0c0b0a"/>
  <rect x="434" y="354" width="16" height="28" rx="2" fill="#0c0b0a" transform="rotate(120, 442, 368)"/>
  <rect x="53" y="354" width="16" height="28" rx="2" fill="#0c0b0a" transform="rotate(240, 61, 368)"/>
  
  <!-- Sector midpoint markers -->
  <circle cx="256" cy="150" r="8" fill="#c4956a" opacity="0.5"/>
  <circle cx="348" cy="320" r="8" fill="#c4956a" opacity="0.5"/>
  <circle cx="164" cy="320" r="8" fill="#c4956a" opacity="0.5"/>
</svg>
